name: Release

# Bug A9-020 reconciliation (2026-05-04):
#
# This workflow runs on tag push (`v*.*.*`) and produces 3-platform archives
# named WITH the version embedded so they match the convention that
# `multi-arch-release.yml`, `bootstrap-install.ps1`, and the winget manifest
# all expect (`mneme-v0.3.2-windows-x64.zip` etc.). Pre-fix, the asset names
# here were `mneme-windows-x64.zip` (no version), which 404'd from the
# bootstrap installer until someone manually re-ran `multi-arch-release.yml`.
#
# Why we keep BOTH workflows:
#   - `release.yml` runs automatically on `git push --tags` -> 3 archives
#     up immediately for the platforms that matter most (Linux x64, macOS
#     arm64, Windows x64). Fast feedback loop.
#   - `multi-arch-release.yml` runs on `release: published` and
#     `workflow_dispatch` -> 5+ archives including arm64 legs. Slower, runs
#     after a Release is published, fills in the long tail.
#
# Both workflows now produce identically-named artifacts, so the bootstrap
# is deterministic regardless of which workflow uploaded last. The only
# remaining difference is matrix breadth, not naming. ORT version is also
# pinned to 1.24.4 in both workflows (bug A9-003 fix).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name (e.g. v0.1.1)"
        required: true

permissions:
  contents: write   # required to upload release assets

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # NOTE (A9-020): asset_name now embeds ${{ github.ref_name }} (the
          # tag, e.g. `v0.3.2`) so output is `mneme-v0.3.2-linux-x64.tar.gz`,
          # matching `multi-arch-release.yml` + bootstrap + winget expectations.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: mneme-${{ github.ref_name }}-linux-x64
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: mneme-${{ github.ref_name }}-macos-arm64
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: mneme-${{ github.ref_name }}-windows-x64
            archive: zip
          # Note: macos-13 (Intel Mac) removed from the matrix. GitHub's
          # hosted Intel Mac runners are chronically queue-starved (hours
          # to days), which blocks the publish job indefinitely. Intel Mac
          # users should run the arm64 asset via Rosetta 2 or build from
          # source. Intel Mac is sunset-class hardware by 2026.
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build Rust workspace (release)
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Install MCP server deps
        # Bug TS-4 (2026-05-01): --frozen-lockfile respects bun.lock so
        # CI builds get deterministic deps. Without it, `^` ranges in
        # package.json could pull a breaking minor on every CI run.
        working-directory: mcp
        run: bun install --production --frozen-lockfile

      # F1 D1: build the Vision SPA fresh on every release. The pre-built
      # `vision/dist/` is committed for in-repo dev use, but on release we
      # always regenerate so the shipped bundle reflects the tagged source.
      # Failure here is release-blocking — a missing dist/ ships a daemon
      # that 404s on `http://127.0.0.1:7777/`, the Vision app entry point.
      - name: Install Vision SPA deps
        working-directory: vision
        run: bun install --frozen-lockfile

      - name: Build Vision SPA
        working-directory: vision
        run: bun run build

      - name: Stage release payload
        shell: bash
        run: |
          mkdir -p release-staging/bin
          mkdir -p release-staging/mcp
          mkdir -p release-staging/static/vision
          mkdir -p release-staging/plugin

          # Rust binaries (.exe suffix on Windows, none elsewhere).
          # NEW-006: every worker binary is release-blocking. v0.3.0 used
          # `|| true` on 7 of 9 copies so a failed sub-build silently
          # shipped an incomplete zip. We drop those swallows now — if a
          # binary is missing the build fails loud, not silent.
          # `mneme-multimodal` is the lone genuinely-optional copy (it is
          # feature-gated behind the multimodal sidecar feature flag and
          # is not built unconditionally on every target).
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/${{ matrix.target }}/release/mneme.exe release-staging/bin/
            cp target/${{ matrix.target }}/release/mneme-daemon.exe release-staging/bin/
            cp target/${{ matrix.target }}/release/mneme-store.exe release-staging/bin/
            cp target/${{ matrix.target }}/release/mneme-parsers.exe release-staging/bin/
            cp target/${{ matrix.target }}/release/mneme-scanners.exe release-staging/bin/
            cp target/${{ matrix.target }}/release/mneme-livebus.exe release-staging/bin/
            cp target/${{ matrix.target }}/release/mneme-md-ingest.exe release-staging/bin/
            cp target/${{ matrix.target }}/release/mneme-brain.exe release-staging/bin/
            # Optional: feature-gated, may or may not be built per-target.
            if [ -f target/${{ matrix.target }}/release/mneme-multimodal.exe ]; then
              cp target/${{ matrix.target }}/release/mneme-multimodal.exe release-staging/bin/
            else
              echo "warning: mneme-multimodal.exe missing (feature-gated, expected when multimodal sidecar is disabled)"
            fi
          else
            cp target/${{ matrix.target }}/release/mneme release-staging/bin/
            cp target/${{ matrix.target }}/release/mneme-daemon release-staging/bin/
            cp target/${{ matrix.target }}/release/mneme-store release-staging/bin/
            cp target/${{ matrix.target }}/release/mneme-parsers release-staging/bin/
            cp target/${{ matrix.target }}/release/mneme-scanners release-staging/bin/
            cp target/${{ matrix.target }}/release/mneme-livebus release-staging/bin/
            cp target/${{ matrix.target }}/release/mneme-md-ingest release-staging/bin/
            cp target/${{ matrix.target }}/release/mneme-brain release-staging/bin/
            # Optional: feature-gated.
            if [ -f target/${{ matrix.target }}/release/mneme-multimodal ]; then
              cp target/${{ matrix.target }}/release/mneme-multimodal release-staging/bin/
            else
              echo "warning: mneme-multimodal missing (feature-gated, expected when multimodal sidecar is disabled)"
            fi
          fi

          # MCP server source (runs under Bun, no compile step)
          cp -R mcp/src release-staging/mcp/
          cp mcp/package.json release-staging/mcp/
          cp mcp/tsconfig.json release-staging/mcp/
          cp -R mcp/node_modules release-staging/mcp/ 2>/dev/null || true

          # F1 D1: Vision SPA static bundle. The daemon's tower-http
          # ServeDir mount in supervisor/src/health.rs::resolve_static_dir
          # looks for `<MNEME_HOME>/static/vision/` first (production
          # layout) and `./vision/dist/` second (in-repo dev fallback).
          # We stage the prebuilt `vision/dist/*` (index.html + assets/)
          # into `release-staging/static/vision/` so a fresh
          # `~/.mneme/` install gets the SPA at the canonical path the
          # daemon expects. Without this, `http://127.0.0.1:7777/`
          # 404s on every fresh install — a regression flagged in
          # `docs-and-memory/phase-a-issues.md §A12`.
          if [ ! -f vision/dist/index.html ]; then
            echo "FATAL: vision/dist/index.html missing — vision SPA was not built before release."
            echo "       Build locally with: cd vision && bun install && bun run build"
            exit 1
          fi
          cp -R vision/dist/. release-staging/static/vision/
          # Sanity check: confirm what we just staged.
          ls release-staging/static/vision/ | head -5
          test -f release-staging/static/vision/index.html
          test -d release-staging/static/vision/assets

          # Plugin manifest + templates
          cp -R plugin release-staging/
          cp marketplace.json release-staging/ 2>/dev/null || true
          cp LICENSE release-staging/
          cp README.md release-staging/

          # Bug REL-4 (2026-05-01): scripts/ + release/ are now part of
          # the release zip. Previously the release.yml zip omitted them
          # entirely so users downloading from GitHub Releases got a zip
          # with no installer — they had to manually invoke `mneme.exe`
          # without any of the post-install wiring (Defender exclusions,
          # Scheduled Task, MCP registration, hook setup). Without
          # scripts/install.ps1 the bootstrap one-liner (which pulls the
          # zip and then calls scripts/install.ps1) silently failed.
          mkdir -p release-staging/scripts
          mkdir -p release-staging/release
          cp -R scripts/. release-staging/scripts/ 2>/dev/null || true
          cp -R release/. release-staging/release/ 2>/dev/null || true
          # VERSION marker so install.ps1 can detect the right tag.
          echo "${GITHUB_REF#refs/tags/}" > release-staging/VERSION.txt 2>/dev/null || true

          # Bug REL-7 (2026-05-01): bundle onnxruntime.dll for Windows
          # so brain's BGE embeddings work without the user having to
          # `mneme models install-onnx-runtime` themselves. Without
          # this, brain silently falls back to the hashing-trick
          # embedder and recall quality silently degrades on every
          # CI-built install. Skipped on POSIX targets — the daemon
          # there expects libonnxruntime via the system package
          # manager (apt/brew install onnxruntime).
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "Downloading onnxruntime DLL for Windows release bundle..."
            # A9-003 (2026-05-04): bumped ORT 1.20.1 -> 1.24.4 to match
            # multi-arch-release.yml. The old 1.20.1 caused silent BGE
            # inference hang on Windows -- tag-push releases through this
            # workflow shipped the broken ORT while the manual multi-arch
            # workflow shipped the working one. Two release paths, two
            # binaries, recall quality silently degrades on whichever zip
            # the user happened to install. Single source of truth now.
            ORT_VERSION="1.24.4"
            ORT_URL="https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-win-x64-${ORT_VERSION}.zip"
            curl -fsSL -o /tmp/ort.zip "$ORT_URL" || {
              echo "warning: ORT download failed; skipping DLL bundle (BGE will fall back to hashing-trick)"
              true
            }
            if [ -f /tmp/ort.zip ]; then
              # PowerShell Expand-Archive is available on every Windows runner.
              pwsh -Command "Expand-Archive -Path /tmp/ort.zip -DestinationPath /tmp/ort -Force"
              # Find onnxruntime.dll inside the extracted tree (path varies by version).
              ORT_DLL=$(find /tmp/ort -name onnxruntime.dll | head -1)
              if [ -n "$ORT_DLL" ]; then
                cp "$ORT_DLL" release-staging/bin/
                echo "ok: bundled $(basename $ORT_DLL) ($(wc -c < "$ORT_DLL") bytes)"
              else
                echo "warning: onnxruntime.dll not found in extracted bundle"
              fi
            fi
          fi

      - name: Package (zip — Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path release-staging\* -DestinationPath ${{ matrix.asset_name }}.zip -Force

      - name: Package (tar.gz — POSIX)
        if: matrix.archive == 'tar.gz'
        run: tar -czf ${{ matrix.asset_name }}.tar.gz -C release-staging .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}.zip
            ${{ matrix.asset_name }}.tar.gz
          if-no-files-found: ignore

  publish:
    name: Publish release
    needs: build
    # Always run so partial-matrix successes still publish. Individual build
    # jobs set `fail-fast: false`, so `needs: build` alone would skip publish
    # if any leg failed. `if: !cancelled()` keeps publish running whenever
    # the workflow wasn't cancelled — which is what we want.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          if ! gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1 ; then
            echo "Release page for $TAG not found — creating it now"
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "Mneme $TAG" \
              --generate-notes
          else
            echo "Release page for $TAG already exists — skipping create"
          fi

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.tag.outputs.value }}" \
            artifacts/**/*.zip \
            artifacts/**/*.tar.gz \
            --repo "${{ github.repository }}" \
            --clobber

      # Bug REL-8 (2026-05-01): upload bootstrap-install.ps1 as a
      # standalone release asset so the canonical one-liner
      #   iex (irm https://github.com/.../releases/download/$tag/bootstrap-install.ps1)
      # actually resolves to the version-matched bootstrap. Previously
      # the script was committed to source but never uploaded — every
      # iex one-liner had to be hand-uploaded after each release. The
      # `bootstrap-install.ps1` here is the EXACT file from `release/`
      # (source-controlled) at this tag, so caller and callee versions
      # cannot drift.
      - name: Upload bootstrap-install.ps1 standalone
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f release/bootstrap-install.ps1 ]; then
            gh release upload "${{ steps.tag.outputs.value }}" \
              release/bootstrap-install.ps1 \
              --repo "${{ github.repository }}" \
              --clobber
            echo "ok: uploaded bootstrap-install.ps1"
          else
            echo "warning: release/bootstrap-install.ps1 missing — iex one-liner will 404"
          fi
