name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  # Daily cron at 12:00 UTC. Only the `audit` job consults the cron trigger
  # (see its `if:` guard) — the rest of the matrix would burn CI minutes for
  # no signal. RUSTSEC advisories update daily, so this catches a new CVE
  # affecting a transitive dep without waiting for the next push or PR.
  # Bug A9-010 (2026-05-04).
  schedule:
    - cron: '0 12 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # The workspace build, tests, default-features multimodal check, audit,
  # deny, doctor-paths, and e2e jobs are all block-on-fail. Clippy is the
  # one remaining soft-fail (parsers-crate Tier-2 grammar cfg warnings —
  # tracked as REG-020); see the inline comment on the Clippy step for
  # context. Closes REG-008.
  RUSTFLAGS: ""

jobs:
  rust:
    name: Rust (build + test + clippy)
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        # B-022 (D:\Mneme Dome cycle, 2026-04-30): ubuntu-22.04 RE-ADDED.
        # Earlier ubuntu cancellations at the 9-min mark were OOM-related
        # (7-GB GitHub runner + parallel daemon-spawn tests). The Test
        # step below now uses `--test-threads=2` on Linux to cap memory
        # pressure. Coverage is critical — `mneme` ships to Linux users
        # and we need a real CI signal there.
        os: [ubuntu-22.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        # Soft-fail: parsers crate still emits unused-feature warnings
        # for Tier-2 grammars that are gated off by default. We surface
        # the warnings in CI logs but don't block merges on them. When
        # the Tier-2 cfg-gating is fixed (REG-020) flip this to enforce.
        continue-on-error: true

      - name: Build
        run: cargo build --workspace --verbose

      - name: Test
        # B-022 v3 (D:\Mneme Dome cycle, 2026-05-01): drop to
        # --test-threads=1 (fully serial) on ubuntu. v1 with
        # --test-threads=2 + ubuntu-22.04 still cancelled at the 9-min
        # mark (CI run 25202102909). Either the OOM is worse than 2-thread
        # tolerates OR it's actually a wall-clock issue (free-tier reclaim)
        # rather than memory. Serial is the safe bet — slower but
        # deterministic. Plus split into per-crate runs so a single
        # crate's slowness doesn't blow the 9-min budget if it's wall-time
        # and not OOM. Windows + macOS retain default parallelism.
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            for crate in mneme-common mneme-store mneme-parsers mneme-scanners \
                         mneme-livebus mneme-multimodal mneme-md-ingest \
                         mneme-brain mneme-daemon mneme-cli; do
              echo "::group::cargo test -p $crate"
              cargo test -p "$crate" --verbose -- --test-threads=1
              echo "::endgroup::"
            done
          else
            cargo test --workspace --verbose
          fi
        shell: bash

      - name: Check multimodal extractors (default features)
        run: cargo check -p mneme-multimodal

      - name: Check multimodal extractors (all optional features)
        # Soft-fail: needs tesseract/whisper/ffmpeg system libs that the
        # GitHub ubuntu-latest image does not pre-install. Failure here
        # is expected and tolerated; the default-features check above
        # is the gating signal. When CI installs the system libs in a
        # setup step, flip this to enforce.
        run: cargo check -p mneme-multimodal --features all-extractors
        continue-on-error: true

  mcp:
    name: MCP server (bun check)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install MCP deps
        working-directory: mcp
        run: bun install

      - name: Type check
        working-directory: mcp
        run: bunx tsc --noEmit
        # Soft-fail: zod strict-input/output diagnostics surface here
        # until the typed-tool migration lands (peer B-MCP-TS). The
        # warnings are visible in CI logs without blocking PRs. Flip
        # to enforce once the migration is complete.
        continue-on-error: true

  vision:
    name: Vision app (bun check)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install vision deps
        working-directory: vision
        run: bun install

      - name: Type check
        working-directory: vision
        run: bunx tsc --noEmit

  # v0.2: the Python multimodal sidecar has been retired. Extraction is
  # now pure Rust in `multimodal-bridge/` (see cli::commands::graphify).
  # Left here as a breadcrumb for anyone grepping for the old job.

  license-check:
    name: License header present
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: LICENSE file exists
        run: test -f LICENSE && grep -qi "apache license" LICENSE

  audit:
    name: Cargo audit (RUSTSEC advisories)
    runs-on: ubuntu-latest
    # Always runs (push, pull_request, workflow_dispatch, AND schedule).
    # All other jobs in this file skip on schedule (see their `if:` guards)
    # so the daily cron tick only burns ~30 seconds of audit-only CI minutes.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run cargo audit
        # Block-on-fail: any RUSTSEC advisory affecting our deps must be
        # triaged before merge. Listing in CI logs is no longer enough.
        # Closes REG-008.
        run: cargo audit --json

  deny:
    name: Cargo deny (license + bans + duplicates)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run cargo-deny
        # Block-on-fail: license / banned-crate / duplicate-version
        # violations must be triaged before merge. Closes REG-008.
        # @v2 ships with cargo-deny 0.16+ on newer Rust toolchain so it can
        # parse edition=2024 manifests in transitive deps (wit-bindgen 0.57.1
        # via wasip2 -> requires Rust 1.85+).
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  home-dir-discipline:
    name: Class HOME guardrail (no raw dirs::home_dir for mneme paths)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Run check-home-dir-discipline.sh
        # Block-on-fail: the CLAUDE.md hard rule "All paths constructed
        # via mneme_common::PathManager. Never join paths manually."
        # The audit 2026-04-29 (Class HOME) found 16+ sites bypassing
        # that rule via `dirs::home_dir()`. The script greps for
        # regressions outside the allowlist (Claude Code / Bun /
        # external-platform-adapter paths only).
        run: bash scripts/check-home-dir-discipline.sh

  doctor-paths:
    name: Doctor cross-platform path tests
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run doctor_paths integration test
        # Block-on-fail: cross-platform path resolution is a release
        # gate. The test fixtures cover Linux + macOS + Windows. Closes
        # REG-008.
        run: cargo test --release -p mneme-cli --test doctor_paths

  e2e-big-repo:
    name: E2E build + recall + blast on a real repo
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build mneme release binary
        run: cargo build --release -p mneme-cli --bin mneme
      - name: Build supervisor
        run: cargo build --release -p mneme-daemon
      - name: Build all workers
        run: cargo build --release --workspace --bins
      - name: Run e2e (clones a fixture repo, builds, recalls, blasts)
        # Block-on-fail: the end-to-end build → recall → blast loop is
        # the headline product surface. Regressions here ship to users.
        # Closes REG-008.
        env:
          MNEME_BIN: ${{ github.workspace }}/target/release/mneme
        run: cargo test --release -p mneme-cli --test e2e_big_repo -- --ignored --nocapture

  chaos-tests:
    # Bug A10-007 (2026-05-04): the chaos suite at cli/tests/chaos_tests.rs
    # has 4 of 7 tests gated behind `cfg_attr(not(feature="test-hooks"), ignore)` —
    # `worker_crash_mid_build_supervisor_restarts`, `disk_fill_aborts_without_partial_writes`,
    # `daemon_kill_via_taskmanager_next_invocation_reattaches`, and
    # `build_interrupt_with_ctrl_c_resumes_from_state`. Without this job
    # those four tests would be silently skipped on every push and the
    # supervisor restart, disk-fill rollback, daemon reattach, and Ctrl-C
    # resume contracts would be unverified in CI.
    name: Chaos tests (cargo test --features test-hooks)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build with test-hooks feature
        run: cargo build --workspace --features test-hooks --bins
      - name: Run chaos suite
        # The suite spawns short-lived supervisor instances that observe
        # injected crashes. --test-threads=1 keeps the per-test daemon
        # isolation deterministic on CI runners with limited resources.
        run: cargo test --features test-hooks -p mneme-cli --test chaos_tests -- --test-threads=1 --nocapture
