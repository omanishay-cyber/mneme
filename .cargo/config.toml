# Bug-2026-05-02 (B11.6): target x86-64-v3 baseline (Haswell 2013+).
# Enables AVX2/BMI2/FMA SIMD across all workspace crates.
# 99% of Windows PCs in 2026 have these (Steam survey). Excludes only
# pre-2013 Intel Atom/Celeron N-series tablets -- irrelevant for mneme's
# developer/AWS workstation use case. Provides 2-4x speedup on
# BGE inference, Leiden community detection, parser tree-sitter,
# scanner regex matching.
#
# 2026-05-03: scope to x86_64 targets only. Unconditional [build] rustflags
# broke aarch64 cross-compile (Linux + macOS) because rustc rejects
# 'x86-64-v3' as an unknown processor for non-x86 targets. Use a
# cfg-keyed [target] section so arm64 builds inherit no extra flags.

[target.'cfg(target_arch = "x86_64")']
rustflags = ["-C", "target-cpu=x86-64-v3"]
