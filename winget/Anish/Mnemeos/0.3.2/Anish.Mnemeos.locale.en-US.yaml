ShortDescription: Mneme OS — local persistent code-graph and AI-superbrain MCP server
Description: |-
  Mneme OS is a local-first persistent code-graph and AI-superbrain Model
  Context Protocol (MCP) server. It indexes a codebase into 22 sharded
  SQLite stores, exposes 48 MCP tools to any compatible AI client, and
  ships a 14-view vision app for visual exploration. All processing is
  local — no telemetry, no cloud calls.

  Both `mnemeos` (canonical) and `mneme` (legacy) commands are wired up.
